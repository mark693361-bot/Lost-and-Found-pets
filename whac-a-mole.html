<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whac-a-Mole</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #2d6a4f;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 30px 20px;
    }

    h1 {
      color: #fff;
      font-size: 2.8rem;
      text-shadow: 3px 3px 0 #1b4332;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    .hud {
      display: flex;
      gap: 40px;
      margin-bottom: 28px;
    }

    .hud-box {
      background: #1b4332;
      color: #fff;
      border-radius: 12px;
      padding: 12px 28px;
      text-align: center;
      min-width: 120px;
      box-shadow: 0 4px 0 #0a2318;
    }

    .hud-box .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.7;
      margin-bottom: 4px;
    }

    .hud-box .value {
      font-size: 2rem;
      font-weight: bold;
    }

    #timer.urgent {
      color: #f4a261;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }

    .hole {
      width: 130px;
      height: 130px;
      background: #1b4332;
      border-radius: 50%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
      cursor: default;
      box-shadow: inset 0 10px 20px rgba(0,0,0,0.5), 0 6px 0 #0a2318;
      position: relative;
    }

    .mole {
      width: 90px;
      height: 90px;
      background: #a0522d;
      border-radius: 50% 50% 40% 40%;
      position: absolute;
      bottom: -90px;
      transition: bottom 0.12s ease-out;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 14px;
      user-select: none;
    }

    .mole::before {
      content: '';
      width: 46px;
      height: 28px;
      background: #c68642;
      border-radius: 50%;
      position: absolute;
      top: 22px;
    }

    .mole::after {
      content: '👀';
      font-size: 1.1rem;
      position: absolute;
      top: 10px;
    }

    .mole .nose {
      width: 14px;
      height: 10px;
      background: #8b1a1a;
      border-radius: 50%;
      position: absolute;
      top: 40px;
      z-index: 1;
    }

    .hole.active .mole {
      bottom: -10px;
    }

    .mole.whacked {
      background: #7a3b1e;
      transition: none;
    }

    .mole.whacked::after {
      content: '💫';
    }

    #start-btn {
      background: #f4a261;
      color: #1b4332;
      border: none;
      border-radius: 12px;
      padding: 14px 48px;
      font-size: 1.3rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 0 #c47a3e;
      transition: transform 0.1s, box-shadow 0.1s;
      letter-spacing: 1px;
    }

    #start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 0 #c47a3e;
    }

    #start-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #c47a3e;
    }

    #start-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: 0 5px 0 #c47a3e;
    }

    #message {
      color: #fff;
      font-size: 1.5rem;
      font-weight: bold;
      text-shadow: 2px 2px 0 #1b4332;
      min-height: 2rem;
      margin-top: 16px;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>Whac-a-Mole!</h1>

  <div class="hud">
    <div class="hud-box">
      <div class="label">Score</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="hud-box">
      <div class="label">Time</div>
      <div class="value" id="timer">30</div>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <button id="start-btn">Start Game</button>
  <div id="message">Press Start to play!</div>

  <script>
    const HOLES = 9;
    const GAME_DURATION = 30;

    const grid = document.getElementById('grid');
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    const startBtn = document.getElementById('start-btn');
    const message = document.getElementById('message');

    let score = 0;
    let timeLeft = GAME_DURATION;
    let running = false;
    let moleTimer = null;
    let countdownTimer = null;
    let activeMole = null;
    let lastHole = null;

    // Build the grid
    const holes = [];
    for (let i = 0; i < HOLES; i++) {
      const hole = document.createElement('div');
      hole.classList.add('hole');

      const mole = document.createElement('div');
      mole.classList.add('mole');

      const nose = document.createElement('div');
      nose.classList.add('nose');
      mole.appendChild(nose);

      mole.addEventListener('click', whack);
      hole.appendChild(mole);
      grid.appendChild(hole);
      holes.push(hole);
    }

    function randomHole() {
      let idx;
      do {
        idx = Math.floor(Math.random() * HOLES);
      } while (holes[idx] === lastHole);
      lastHole = holes[idx];
      return holes[idx];
    }

    function randomTime(min, max) {
      return Math.random() * (max - min) + min;
    }

    function showMole() {
      if (!running) return;

      const hole = randomHole();
      const mole = hole.querySelector('.mole');
      const duration = randomTime(600, 1200);

      hole.classList.add('active');
      activeMole = hole;

      moleTimer = setTimeout(() => {
        hole.classList.remove('active');
        activeMole = null;
        if (running) showMole();
      }, duration);
    }

    function whack(e) {
      if (!running) return;
      const mole = e.currentTarget;
      const hole = mole.parentElement;
      if (!hole.classList.contains('active')) return;

      score++;
      scoreEl.textContent = score;

      mole.classList.add('whacked');
      hole.classList.remove('active');
      clearTimeout(moleTimer);
      activeMole = null;

      setTimeout(() => {
        mole.classList.remove('whacked');
        if (running) showMole();
      }, 300);
    }

    function startGame() {
      score = 0;
      timeLeft = GAME_DURATION;
      scoreEl.textContent = '0';
      timerEl.textContent = GAME_DURATION;
      timerEl.classList.remove('urgent');
      message.textContent = '';
      running = true;

      startBtn.disabled = true;

      // Remove any leftover active holes
      holes.forEach(h => {
        h.classList.remove('active');
        h.querySelector('.mole').classList.remove('whacked');
      });

      showMole();

      countdownTimer = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft;
        if (timeLeft <= 10) timerEl.classList.add('urgent');
        if (timeLeft <= 0) endGame();
      }, 1000);
    }

    function endGame() {
      running = false;
      clearTimeout(moleTimer);
      clearInterval(countdownTimer);

      // Hide any visible mole
      holes.forEach(h => h.classList.remove('active'));
      activeMole = null;

      message.textContent = `Time's up! Final score: ${score} 🎉`;
      startBtn.disabled = false;
      startBtn.textContent = 'Play Again';
    }

    startBtn.addEventListener('click', startGame);
  </script>

</body>
</html>
